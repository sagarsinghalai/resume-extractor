<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Resume Extractor{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold fs-5" href="/">
      <i class="bi bi-file-person-fill me-2 text-info"></i>Resume Extractor
    </a>
    <div class="navbar-nav ms-auto flex-row gap-2">
      <a class="nav-link text-white px-3 py-2 rounded {% if request.path == '/' %}bg-white bg-opacity-10{% endif %}" href="/">
        <i class="bi bi-grid-3x3-gap me-1"></i>Dashboard
      </a>
      <a class="nav-link text-white px-3 py-2 rounded {% if request.path == '/upload' %}bg-white bg-opacity-10{% endif %}" href="/upload">
        <i class="bi bi-cloud-upload me-1"></i>Upload
      </a>
    </div>
  </div>
</nav>

<div class="container-fluid py-4 px-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
