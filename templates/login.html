{% extends "base.html" %}
{% block title %}Login — Resume Extractor{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">

    <div class="text-center mb-4">
      <i class="bi bi-file-person-fill display-3 text-primary"></i>
      <h4 class="fw-bold mt-2">Resume Extractor</h4>
      <p class="text-muted small">Sign in to your account</p>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">

        {% if error %}
          <div class="alert alert-danger py-2 small rounded-3">
            <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
          </div>
        {% endif %}

        <form method="POST" action="/login">
          <div class="mb-3">
            <label class="form-label fw-semibold small">Username</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="bi bi-person text-muted"></i>
              </span>
              <input type="text" class="form-control border-start-0" name="username"
                     placeholder="Enter username" required autofocus>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold small">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="bi bi-lock text-muted"></i>
              </span>
              <input type="password" class="form-control border-start-0" name="password"
                     placeholder="Enter password" required>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
          </button>
        </form>

      </div>
    </div>

  </div>
</div>
{% endblock %}
