{% extends "base.html" %}
{% block title %}Site Settings — Resume Extractor{% endblock %}

{% block head %}
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
{% endblock %}

{% block content %}

<div class="d-flex align-items-center mb-4">
  <h4 class="fw-bold mb-0">
    <i class="bi bi-gear-fill me-2 text-primary"></i>Site Settings
  </h4>
</div>

<form method="POST" action="/admin/site-settings" id="settings-form">

  <!-- HubSpot Form Embed -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-header border-0 py-3 px-4 fw-semibold text-white"
         style="background: linear-gradient(135deg,#0f3460,#1a73e8)">
      <i class="bi bi-code-square me-2"></i>HubSpot Form Embed Code
    </div>
    <div class="card-body p-4">
      <label class="form-label small fw-semibold">
        Paste the full HubSpot embed <code>&lt;script&gt;</code> block below.
        This will be shown on the <a href="/reseller" target="_blank">Reseller page</a>.
      </label>
      <textarea name="hubspot_form_code" class="form-control font-monospace" rows="8"
                placeholder="<!-- HubSpot embed code -->&#10;<script charset=&quot;utf-8&quot; type=&quot;text/javascript&quot; src=&quot;//js.hsforms.net/forms/embed/v2.js&quot;></script>...">{{ hubspot_form_code }}</textarea>
    </div>
  </div>

  <!-- Contact Us Content -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-header border-0 py-3 px-4 fw-semibold text-white"
         style="background: linear-gradient(135deg,#0f3460,#1a73e8)">
      <i class="bi bi-file-richtext me-2"></i>Contact Us Page Content
    </div>
    <div class="card-body p-4">
      <label class="form-label small fw-semibold">
        This content appears on the <a href="/contact" target="_blank">Contact Us page</a>.
        You can include email addresses, phone numbers, social links, etc.
      </label>

      <!-- Quill editor -->
      <div id="quill-editor" style="min-height:200px; background:#fff;"></div>

      <!-- Hidden textarea that syncs with Quill and gets submitted -->
      <textarea name="contact_us_content" id="contact-us-textarea" class="d-none">{{ contact_us_content }}</textarea>
    </div>
  </div>

  <div class="d-flex gap-3">
    <button type="submit" class="btn btn-primary fw-semibold px-4">
      <i class="bi bi-floppy-fill me-2"></i>Save Settings
    </button>
    <a href="/admin/users" class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>

{% endblock %}

{% block scripts %}
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script>
  // Init Quill
  var quill = new Quill('#quill-editor', {
    theme: 'snow',
    placeholder: 'Write contact information here...',
    modules: {
      toolbar: [
        [{ 'header': [1, 2, 3, false] }],
        ['bold', 'italic', 'underline'],
        [{ 'list': 'ordered' }, { 'list': 'bullet' }],
        ['link'],
        ['clean'],
      ]
    }
  });

  // Pre-populate Quill with existing content
  const existingHtml = document.getElementById('contact-us-textarea').value;
  if (existingHtml) {
    quill.clipboard.dangerouslyPasteHTML(existingHtml);
  }

  // Sync Quill → hidden textarea before submit
  document.getElementById('settings-form').addEventListener('submit', function() {
    document.getElementById('contact-us-textarea').value = quill.root.innerHTML;
  });
</script>
{% endblock %}
