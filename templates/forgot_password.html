{% extends "base_public.html" %}
{% block title %}Forgot Password — Resume Extractor{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">

    <div class="text-center mb-4">
      <i class="bi bi-key-fill display-3 text-primary"></i>
      <h4 class="fw-bold mt-2">Forgot your password?</h4>
      <p class="text-muted small">Enter your email address and we'll send you a reset link.</p>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="POST" action="/forgot-password">
          <div class="mb-3">
            <label class="form-label fw-semibold small">Email Address</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="bi bi-envelope text-muted"></i>
              </span>
              <input type="email" class="form-control border-start-0" name="email"
                     placeholder="you@example.com" required autofocus>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
            <i class="bi bi-send me-2"></i>Send Reset Link
          </button>
        </form>
        <div class="text-center mt-3">
          <a href="/login" class="text-muted small">
            <i class="bi bi-arrow-left me-1"></i>Back to login
          </a>
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}
