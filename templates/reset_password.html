{% extends "base_public.html" %}
{% block title %}Reset Password — Resume Extractor{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">

    <div class="text-center mb-4">
      <i class="bi bi-shield-lock-fill display-3 text-primary"></i>
      <h4 class="fw-bold mt-2">Reset Your Password</h4>
      <p class="text-muted small">Enter a new password for your account.</p>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">

        {% if error %}
          <div class="alert alert-danger py-2 small rounded-3">
            <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
          </div>
        {% endif %}

        <form method="POST" action="/reset-password/{{ token }}">
          <div class="mb-3">
            <label class="form-label fw-semibold small">New Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="bi bi-lock text-muted"></i>
              </span>
              <input type="password" class="form-control border-start-0" name="new_password"
                     placeholder="New password" required autofocus minlength="6">
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold small">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="bi bi-lock-fill text-muted"></i>
              </span>
              <input type="password" class="form-control border-start-0" name="confirm_password"
                     placeholder="Confirm new password" required minlength="6">
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
            <i class="bi bi-check2-circle me-2"></i>Reset Password
          </button>
        </form>
        <div class="text-center mt-3">
          <a href="/login" class="text-muted small">
            <i class="bi bi-arrow-left me-1"></i>Back to login
          </a>
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}
